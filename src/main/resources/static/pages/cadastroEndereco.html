<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8"> <!-- define padrão de caracteres -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- deixa responsivo no celular -->
  <title>Cadastro Endereço</title> <!-- título da aba -->
  <link rel="stylesheet" href="../css/cadastroEndereco.css"> <!-- CSS da página -->
  <link rel="icon" type="image/png" href="./img/Logo_Reobote.png" /> <!-- ícone da aba -->
</head>

<body>

  <header class="header"> <!-- cabeçalho -->
    <div class="container"> <!-- container do header -->
      <div class="logo-section"> <!-- área do logo -->
        <a href="../index.html"><img src="../img/Logo_Reobote.png" alt="Reobote" class="logo-img"></a> <!-- logo clicável -->
      </div>
    </div>
  </header>

  <div class="form-container"> <!-- container do formulário -->
    <h2>ENDEREÇO</h2> <!-- título da seção -->

    <form id="cadastroEndereco"> <!-- formulário de cadastro -->
      <div class="linha"> <!-- linha com 2 campos -->
		<div class="col"> <!-- coluna -->
		  <label for="cep">CEP: <span class="obrigatorio">*</span></label> <!-- label cep -->
		  <input id="cep" type="text" placeholder="00000-000" required> <!-- input cep -->
		</div>
        <div class="col"> <!-- coluna -->
          <label for="bairro">Bairro: <span class="obrigatorio">*</span></label> <!-- label bairro -->
          <input id="bairro" type="text" placeholder="Digite o bairro" disabled> <!-- campo desabilitado, preenchido via API -->
        </div>
      </div>

	  <label for="rua">Rua: <span class="obrigatorio">*</span></label> <!-- label rua -->
	  <input id="rua" type="text" placeholder="Digite o nome da rua" disabled> <!-- campo desabilitado, preenchido via CEP -->
	  
      <div class="linha"> <!-- linha com 2 campos -->
        <div class="col"> <!-- coluna -->
          <label for="numero">Número: <span class="obrigatorio">*</span></label> <!-- label número -->
          <input id="numero" type="text" placeholder="Número" required> <!-- input número -->
        </div>
        <div class="col"> <!-- coluna -->
          <label for="cidade">Cidade: <span class="obrigatorio">*</span></label> <!-- label cidade -->
          <input id="cidade" type="text" placeholder="Digite a cidade" disabled> <!-- preenchido via API -->
        </div>
      </div>

      <label for="complemento">Complemento:</label> <!-- label complemento -->
      <input id="complemento" type="text" placeholder="Apartamento, bloco, etc."> <!-- input complemento -->

      <label for="estado">Estado: <span class="obrigatorio">*</span></label> <!-- label estado -->
      <select id="estado" disabled> <!-- select estado, desabilitado pois vem do CEP -->
        <option value="">Selecione o estado</option> <!-- placeholder -->
        <option value="AC">Acre</option>
        <option value="SP">São Paulo</option>
        <option value="RJ">Rio de Janeiro</option>
        <!-- Adicione outros estados conforme necessário -->
      </select>

      <label for="pais">País: <span class="obrigatorio">*</span></label> <!-- label país -->
      <input id="pais" type="text" value="Brasil" disabled> <!-- país fixo e desabilitado -->

      <button class="botao" type="submit">CADASTRAR ENDEREÇO</button> <!-- botão para enviar -->
    </form>
  </div>

  <script src="../script/scriptEndereco.js"></script> <!-- script que vai buscar dados via CEP -->

</body>
</html>
