<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - Reobote</title>
  <link rel="stylesheet" href="../css/cadastro.css" />
  <link rel="icon" type="image/png" href="../img/Logo_Reobote.png" />
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="container">
      <div class="logo-section">
        <a href="../index.html">
          <img src="../img/Logo_Reobote.png" alt="Logo da Reobote" class="logo-img" />
        </a>
      </div>
    </div>
  </header>

  <!-- ===== FORMULÁRIO DE CADASTRO ===== -->
  <main class="form-container">
    <h2>CADASTRE-SE</h2>

    <form id="cadastroClienteForm">
      <!-- Nome -->
      <label for="nome">Nome Completo:<span class="required">*</span></label>
      <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required/>

      <!-- Email -->
      <label for="email">E-mail:<span class="required">*</span></label>
      <input 
        type="email" 
        id="email" 
        name="email"
        placeholder="Digite seu e-mail" 
        required 
        autocomplete="email"/>

      <!-- Telefone -->
      <label for="telefone">Telefone:<span class="required">*</span></label>
      <input 
        type="tel" 
        id="telefone" 
        name="telefone"
        placeholder="(xx) xxxxx-xxxx" 
        pattern="\(\d{2}\)\s?\d{4,5}-\d{4}" 
        required
        autocomplete="tel"
      />

      <!-- CPF / CNPJ -->
      <label for="cpf">CPF/CNPJ:<span class="required">*</span></label>
      <input 
        type="text" 
        id="cpf" 
        name="cpf"
        placeholder="Digite seu CPF ou CNPJ" 
        required
        minlength="11"
        maxlength="18"
      />

      <!-- Senha -->
      <label for="senha">Senha:<span class="required">*</span></label>
      <div class="input-wrapper">
        <input 
          type="password" 
          id="senha" 
          name="senha"
          placeholder="Crie uma senha" 
          required 
          minlength="6"
          autocomplete="new-password"
        />


      <!-- Botão -->
      <button type="submit" class="btn-cadastro">CADASTRAR-SE</button>
    </form>
  </main>

  <script src="../script/scriptCadastro.js"></script>
</body>
</html>
